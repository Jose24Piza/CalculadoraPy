name: Calculadora CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"  # Versión corregida
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # No hay dependencias reales, solo mostramos mensaje
        echo "No hay dependencias que instalar"
    
    - name: Run tests
      run: |
        python -c "from calculator import Calculator; calc = Calculator(); assert calc.sum(2,3) == 5; assert calc.subtract(10,4) == 6; assert calc.multiply(3,4) == 12; assert calc.divide(10,2) == 5; print('✅ Todas las pruebas pasaron exitosamente')"
    
    - name: Test calculator functionality
      run: |
        python app.py << EOF
        10
        +
        5
        EOF