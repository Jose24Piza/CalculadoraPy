name: Calculadora CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # JOB 1: Tests
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Verificar archivos
      run: |
        echo "📁 Archivos encontrados:"
        ls -la
        echo ""
        echo "🔍 Verificando archivos Python:"
        ls -la *.py || echo "⚠️ No hay archivos .py"
        test -f calculadora.py && echo "✅ calculadora.py existe" || echo "❌ calculadora.py no existe"
        test -f app.py && echo "✅ app.py existe" || echo "❌ app.py no existe"
    
    - name: Pruebas unitarias
      run: |
        python -c "
        from calculadora import Calculator
        calc = Calculator()
        
        # Todas las pruebas pasan correctamente
        assert calc.sum(2, 3) == 5
        assert calc.subtract(10, 5) == 5
        assert calc.multiply(3, 4) == 12
        assert calc.divide(10, 2) == 5
        
        print('✅ Todas las pruebas pasaron correctamente 🎉')
        "
    
    - name: Prueba de app.py
      run: |
        echo -e "10\n+\n5" | python app.py | grep -q "15.0"
        echo "✅ app.py funciona correctamente"
    
    - name: Guardar estado de tests
      run: |
        echo "TESTS_PASSED=true" >> $GITHUB_ENV

  # JOB 2: Despliegue a GitHub Pages (solo si tests pasan)
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()  # Solo se ejecuta si los tests pasaron
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Preparar archivos para Pages
      run: |
        # Crear carpeta para Pages
        mkdir -p _site
        
        # Copiar archivos HTML, CSS, JS
        cp index.html _site/
        cp style.css _site/
        cp script.js _site/
        cp .nojekyll _site/ 2>/dev/null || echo "" > _site/.nojekyll
        
        # Crear archivo de estado del build
        cat > _site/build-status.json << EOF
        {
          "status": "success",
          "timestamp": "$(date -Iseconds)",
          "commit": "${GITHUB_SHA:0:7}",
          "tests": "passed"
        }
        EOF
        
        # Mostrar contenido
        echo "📁 Contenido de _site:"
        ls -la _site/
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4