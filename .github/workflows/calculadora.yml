name: Calculadora CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Verificar archivos
      run: |
        echo "Verificando archivos..."
        ls -la
        test -f calculator.py && echo "✅ calculator.py existe"
        test -f app.py && echo "✅ app.py existe"
    
    - name: Prueba básica de la calculadora
      run: |
        echo "Ejecutando pruebas básicas..."
        python -c "
        from calculator import Calculator
        calc = Calculator()
        
        # Pruebas básicas
        assert calc.sum(2, 3) == 5
        assert calc.subtract(10, 4) == 6
        assert calc.multiply(3, 4) == 12
        assert calc.divide(10, 2) == 5
        
        print('✅ Calculadora funciona correctamente!')
        "
    
    - name: Prueba de la app en consola
      run: |
        echo "Probando app.py..."
        echo -e "10\n+\n5" | python app.py | grep -q "15.0"
        echo -e "10\n/\n2" | python app.py | grep -q "5.0"
        echo "✅ App funciona correctamente!"
    
    - name: Resumen final
      run: |
        echo ""
        echo "🎉 TODAS LAS PRUEBAS PASARON"
        echo "✅ Calculadora operativa"
        echo "✅ App funcionando"