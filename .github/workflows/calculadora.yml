name: Calculadora CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"  # ✅ Corregido: versión 3.10 en lugar de 9.99
    
    - name: Verificar archivos
      run: |
        echo "Verificando archivos del proyecto..."
        ls -la
        test -f calculator.py && echo "✅ calculator.py existe"
        test -f app.py && echo "✅ app.py existe"
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        # ✅ Corregido: requirements.txt ya no tiene librería inventada
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt || echo "No hay dependencias que instalar"
        else
          echo "No hay requirements.txt"
        fi
    
    - name: Pruebas unitarias
      run: |
        echo "Ejecutando pruebas unitarias..."
        python -c "
        from calculator import Calculator
        calc = Calculator()
        
        # Pruebas de suma
        assert calc.sum(2, 3) == 5
        assert calc.sum(-1, 1) == 0
        assert calc.sum(0, 0) == 0
        
        # Pruebas de resta
        assert calc.subtract(10, 5) == 5
        assert calc.subtract(0, 5) == -5
        assert calc.subtract(-5, -3) == -2
        
        # Pruebas de multiplicación
        assert calc.multiply(4, 5) == 20
        assert calc.multiply(0, 10) == 0
        assert calc.multiply(-3, 4) == -12
        
        # Pruebas de división
        assert calc.divide(10, 2) == 5
        assert calc.divide(7, 2) == 3.5
        assert calc.divide(-10, 2) == -5
        
        # Prueba de división entre cero
        try:
            calc.divide(10, 0)
            print('❌ Error: Debería lanzar excepción')
            exit(1)
        except ValueError as e:
            assert str(e) == 'No se puede dividir por cero'
        
        print('✅ Todas las pruebas unitarias pasaron correctamente')
        "
    
    - name: Pruebas funcionales con app.py
      run: |
        echo "Probando la aplicación en consola..."
        
        # Prueba de suma
        echo -e "10\n+\n5" | python app.py | grep -q "15.0"
        echo "✅ Prueba de suma exitosa"
        
        # Prueba de resta
        echo -e "20\n-\n8" | python app.py | grep -q "12.0"
        echo "✅ Prueba de resta exitosa"
        
        # Prueba de multiplicación
        echo -e "6\n*\n7" | python app.py | grep -q "42.0"
        echo "✅ Prueba de multiplicación exitosa"
        
        # Prueba de división
        echo -e "15\n/\n3" | python app.py | grep -q "5.0"
        echo "✅ Prueba de división exitosa"
        
        # Prueba de error - división por cero
        echo -e "10\n/\n0" | python app.py | grep -q "No se puede dividir por cero"
        echo "✅ Prueba de manejo de error exitosa"
        
        # Prueba de operación inválida
        echo -e "5\n%\n3" | python app.py | grep -q "Operación no válida"
        echo "✅ Prueba de operación inválida exitosa"
    
    - name: Reporte final
      run: |
        echo ""
        echo "========================================="
        echo "🎉 TODAS LAS PRUEBAS PASARON EXITOSAMENTE"
        echo "========================================="
        echo "✅ Archivos verificados"
        echo "✅ Dependencias instaladas"
        echo "✅ Pruebas unitarias completadas"
        echo "✅ Pruebas funcionales completadas"
        echo "✅ Manejo de errores correcto"
        echo "========================================="
        echo ""
        echo "📦 Calculadora funcionando correctamente"
        echo "🔧 Versión Python: 3.10"
        echo "📊 Pipeline status: ÉXITO"
        echo "========================================="