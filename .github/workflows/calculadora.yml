name: Calculadora CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Verificar archivos
      run: |
        echo "Archivos encontrados:"
        ls -la *.py
        test -f calculadora.py && echo "✅ calculadora.py existe"
        test -f app.py && echo "✅ app.py existe"
    
    - name: Pruebas unitarias
      run: |
        python -c "
        from calculadora import Calculator  # ✅ Usando el nombre correcto
        calc = Calculator()
        
        # Pruebas
        assert calc.sum(2, 3) == 5
        assert calc.subtract(10, 5) == 5
        assert calc.multiply(3, 4) == 12
        assert calc.divide(10, 2) == 5
        
        print('✅ Todas las pruebas pasaron correctamente')
        "
    
    - name: Prueba de app.py
      run: |
        echo -e "10\n+\n5" | python app.py | grep -q "15.0"
        echo "✅ app.py funciona correctamente"